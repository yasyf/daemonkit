name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true
      - name: Vet
        run: go vet ./...
      - name: Test (race, via the process-cap harness)
        run: ./scripts/test.sh -race ./...
      - name: Build (pure)
        run: CGO_ENABLED=0 go build ./...

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true
      - name: golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: latest

  vuln:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true
      - name: govulncheck
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./...

  # One Swift job, not a matrix: everything needs the same macOS runner, and
  # macOS minutes bill 10x. macos-26 is pinned (not macos-latest) because the
  # image ships Xcode 26.x — the Swift 6.2 toolchain Package.swift needs.
  swift:
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v7
      - uses: actions/cache@v5
        with:
          path: .build
          key: spm-${{ runner.os }}-${{ hashFiles('Package.resolved') }}
          restore-keys: spm-${{ runner.os }}-
      - name: Install lint tools missing from the image
        # macos-26 ships swiftformat but not swiftlint; guard both against image churn.
        run: |
          command -v swiftformat >/dev/null || brew install swiftformat
          command -v swiftlint >/dev/null || brew install swiftlint
      - name: Format (lint mode)
        run: swiftformat --lint .
      - name: Lint
        run: swiftlint --quiet
      - name: Build
        run: swift build
      - name: Test
        run: swift test
