name: CI

on:
  push:
    branches: [main]
  pull_request:

# Cancel superseded runs on PRs only. On main, an in-progress run always
# finishes (new pushes queue; GitHub keeps just the newest pending run) —
# cancel-in-progress here repeatedly killed the slow swift job under rapid
# pushes, leaving commits with no complete CI verdict.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read

# Every job is sub-minute when caches hit; the timeouts exist so a wedged
# test dies in minutes with logs instead of running to the 6-hour kill
# (a hung `swift test` once burned 4.9 idle hours).
jobs:
  test:
    runs-on: ${{ matrix.os }}
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true
      - name: Codegen drift gate
        # Both lifeproto bindings (Go + Swift) are generated from one schema
        # (wire/lifeproto/gen). Regenerating must be a no-op against the committed
        # files; a diff means a generated file was hand-edited or the schema
        # changed without a regenerate. Run once, on Linux — the output is
        # host-independent and needs no Swift toolchain.
        if: matrix.os == 'ubuntu-latest'
        run: |
          go generate ./wire/...
          git diff --exit-code -- wire/lifeproto/lifeproto.go Sources/DaemonKit/LifecycleWire.swift
      - name: Vet
        # -unsafeptr=false: trust/ and appgroup/ deref dlsym'd C data symbols
        # (fixed dyld addresses) — legitimate FFI vet's unsafeptr can't tell from
        # a bug. Every other analyzer stays on.
        run: go vet -unsafeptr=false ./...
      - name: Test (race, via the process-cap harness)
        run: ./scripts/test.sh -race ./...
      - name: Build (pure)
        run: CGO_ENABLED=0 go build ./...

  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true
      - name: golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: latest

  vuln:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true
      - name: govulncheck
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./...

  # One Swift job, not a matrix: everything needs the same macOS runner, and
  # macOS minutes bill 10x. macos-26 is pinned (not macos-latest) because the
  # image ships Xcode 26.x — the Swift 6.2 toolchain Package.swift needs.
  swift:
    runs-on: macos-26
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7
      - uses: actions/cache@v5
        with:
          path: .build
          key: spm-${{ runner.os }}-${{ hashFiles('Package.resolved') }}
          restore-keys: spm-${{ runner.os }}-
      - name: Install lint tools missing from the image
        # macos-26 ships swiftformat but not swiftlint; guard both against image churn.
        run: |
          command -v swiftformat >/dev/null || brew install swiftformat
          command -v swiftlint >/dev/null || brew install swiftlint
      - name: Format (lint mode)
        run: swiftformat --lint .
      - name: Lint
        run: swiftlint --quiet
      - name: Build
        run: swift build
      - name: Test
        run: swift test
