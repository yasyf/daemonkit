name: CI

on:
  push:
    branches: [main]
  pull_request:

# PRs only: cancel-in-progress on main repeatedly killed the slow swift job
# mid-run, leaving commits with no CI verdict (ccn af9889a).
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read

# Timeouts kill a wedged test in minutes instead of GitHub's 6-hour cap
# (ccn af9889a).
jobs:
  source-release-contract:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - uses: actions/checkout@v7
      - name: Verify source-only release contract
        run: ./scripts/release-check.sh --tree

  test:
    runs-on: ${{ matrix.os }}
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true
      - name: Codegen drift gate
        # Regenerating both lifeproto bindings must be a no-op against the
        # committed files. Linux-only: the output is host-independent.
        if: matrix.os == 'ubuntu-latest'
        run: |
          go generate ./wire/...
          git diff --exit-code -- wire/lifeproto/lifeproto.go Sources/DaemonKit/LifecycleWire.swift
      - name: Vet
        # -unsafeptr=false: dlsym data-symbol FFI in trust/ (ccn 239201e).
        run: go vet -unsafeptr=false ./...
      - name: Test (race, via the process-cap harness)
        run: ./scripts/test.sh -race ./...
      - name: Build (pure)
        run: CGO_ENABLED=0 go build ./...

  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true
      - name: golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: latest

  vuln:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true
      - name: govulncheck
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./...

  # One Swift job (macOS minutes bill 10x); macos-26 pinned — its image ships
  # the Xcode 26.x / Swift 6.2 toolchain Package.swift needs.
  swift:
    runs-on: macos-26
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7
      - name: Install lint tools missing from the image
        # macos-26 ships swiftformat but not swiftlint; guard both against image churn.
        run: |
          command -v swiftformat >/dev/null || brew install swiftformat
          command -v swiftlint >/dev/null || brew install swiftlint
      - name: Format (lint mode)
        run: swiftformat --lint .
      - name: Lint
        run: swiftlint --quiet
      - name: Build
        run: swift build
      - name: Test
        run: swift test
      - name: Strict cooperative executor transport
        env:
          LIBDISPATCH_COOPERATIVE_POOL_STRICT: "1"
        run: swift test --filter strictExecutorRunsProductionClientAndServerTogether
