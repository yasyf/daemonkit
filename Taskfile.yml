version: '3'

tasks:
  build:
    desc: Build every Go package pure (proves the module stays cgo-free)
    cmds:
      - CGO_ENABLED=0 go build ./...

  test:
    desc: Run the Go suite with the race detector, via the process-cap harness
    cmds:
      - ./scripts/test.sh -race -count=1 ./...

  test-swift:
    desc: Run the Swift package tests
    cmds:
      - swift test

  vet:
    desc: Vet the module
    # -unsafeptr=false: trust/ and appgroup/ deref dlsym'd C data symbols (fixed
    # dyld addresses, not Go pointers) — a legitimate FFI pattern vet's unsafeptr
    # heuristic can't distinguish from a bug. Every other analyzer stays on.
    cmds:
      - go vet -unsafeptr=false ./...

  lint:
    desc: Lint with golangci-lint
    cmds:
      - golangci-lint run

  fmt:
    desc: Format with gofumpt + goimports (via golangci-lint)
    cmds:
      - golangci-lint fmt

  ci:
    desc: Everything CI runs
    cmds:
      - task: vet
      - task: lint
      - task: test
      - task: build
      - task: test-swift
