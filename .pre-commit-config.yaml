# Commit-time checks for Go: gofumpt + goimports formatting and golangci-lint.
# Run by prek — a fast Rust drop-in for pre-commit that reads this file unchanged.
# Activate once per clone:  uvx prek install
# The rev pins the golangci-lint version; bump it with `uvx prek autoupdate`.
repos:
  - repo: https://github.com/golangci/golangci-lint
    rev: v2.12.2
    hooks:
      - id: golangci-lint-fmt
      - id: golangci-lint
  # Swift: SwiftFormat (nicklockwood) + SwiftLint, deliberately `repo: local` +
  # `language: system` against the brew binaries (brew install swiftformat
  # swiftlint) — the upstream repos' hooks build from source via SPM on first
  # run (minutes-long). Don't "upgrade" this to the remote hooks.
  - repo: local
    hooks:
      - id: swiftformat
        name: swiftformat
        entry: swiftformat
        language: system
        types: [swift]
      - id: swiftlint
        name: swiftlint
        entry: swiftlint --quiet --force-exclude
        language: system
        types: [swift]
