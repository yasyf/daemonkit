# golangci-lint v2: `fmt` applies the formatters, `run` the linters. CI and the
# prek commit hook run both.
version: "2"

run:
  timeout: 5m

linters:
  default: none
  enable:
    - contextcheck
    - durationcheck
    - errcheck
    - errorlint
    - gosec
    - govet
    - ineffassign
    - prealloc
    - revive
    - staticcheck
    - unused
  settings:
    govet:
      # unsafeptr: trust/verify_darwin.go derefs dlsym'd CF data symbols — fixed
      # dyld addresses, not Go pointers (ccn 239201e). Lockstep with the
      # -unsafeptr=false vet step in Taskfile.yml and ci.yml.
      disable:
        - unsafeptr
    errcheck:
      # Best-effort teardown closes are the package idiom; no caller remedy.
      exclude-functions:
        - (io.Closer).Close
        - syscall.Close
        - os.RemoveAll
        # The one integrity-critical release is checked via TransitionConfig.ReleaseLock.
        - (*github.com/yasyf/daemonkit/proc.FlockHandle).Release
  exclusions:
    rules:
      # Spawning processes with caller-fixed argv is the package's whole job.
      - linters: [gosec]
        text: "G204"
      # File and socket APIs take caller-supplied paths by design.
      - linters: [gosec]
        text: "G304"
      - linters: [gosec]
        text: "G704"
      # Same teardown idiom; exclude-functions can't name every concrete Close.
      - linters: [errcheck]
        text: 'Error return value of `.*\.Close` is not checked'
      # G104 duplicates errcheck, which owns unhandled-error reporting.
      - linters: [gosec]
        text: "G104"
      # A resolved artifact must carry the executable bit; extracted archive
      # members stay 0600 and only the entrypoint is chmod'd executable.
      - linters: [gosec]
        text: "G302"
        path: ^artifact/
      # Test fixtures read/write their own temp paths and don't wrap errors.
      - path: _test\.go$
        linters: [gosec, errorlint]

formatters:
  enable:
    - gofumpt
    - goimports
